name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install scientific dependencies
        # Only the libraries the unit tests need (the tests do not hit the network).
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy scikit-learn statsmodels pytest

      - name: Run unit tests
        run: pytest -q
